services:
  ollama:
    image: ollama/ollama:0.18.3
    container_name: ollama
    hostname: ollama
    restart: always
    ports:
      - "127.0.0.1:11436:11434"
    entrypoint: ["ollama", "serve"]
    volumes:
      - ./models/:/models
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_THREADS=4      # limit CPU usage, keep host responsive
      - OLLAMA_MAX_CTX=2048       # small context window reduces chance of long unsafe runs
      - OLLAMA_DISABLE_WHITELIST=0  # we'll add our own whitelist (see 4)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.8.12
    container_name: open-webui
    restart: always
    ports:
      - "8282:8080"
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434/api
  
